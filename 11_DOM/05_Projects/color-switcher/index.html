<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Color Switcher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Switcher</h1>

      <div class="buttons">
        <button class="color-btn" data-color="#ff6b6b">Red</button>
        <button class="color-btn" data-color="#4ecdc4">Teal</button>
        <button class="color-btn" data-color="#ffe66d">Yellow</button>
        <button class="color-btn" data-color="#1a535c">Dark</button>
      </div>

      <p id="color-code">Current Color: #ffffff</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
