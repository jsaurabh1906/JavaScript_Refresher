<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Counter App</title>
    <link rel="stylesheet" href="counter.css" />
  </head>
  <body>
    <div class="container">
      <h1>Counter</h1>
      <p id="count">0</p>

      <div class="buttons">
        <button id="decrement">-</button>
        <button id="reset">Reset</button>
        <button id="increment">+</button>
      </div>
    </div>

    <script src="counter.js"></script>
  </body>
</html>
